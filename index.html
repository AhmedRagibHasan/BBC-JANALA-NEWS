<!DOCTYPE html>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">

            <div class="max-w-7xl mx-auto px-5">
                <img class="invert" src="./assets/logo.svg" alt="">
            </div>
        </div>

        <nav class="border-b border-gray-200">
            <ul id="category_Container" class="flex gap-10 text-lg max-w-7xl mx-auto">

                <li class="hover:border-b-4 hover:border-red-600 cursor-pointer">রাজনীতি</li>
                <li class="hover:border-b-4 hover:border-red-600 cursor-pointer">বিশ্ব</li>
                <li class="hover:border-b-4 hover:border-red-600 cursor-pointer">অর্থনীতি</li>

            </ul>
        </nav>

    </header>

    <main class="max-w-7xl mx-auto px-5 mt-5 grid grid-cols-4 gap-5">

        <div class="grid grid-cols-3 col-span-3 gap-5" id="news_Container">

            <div class="bg-red-500 p-3 text-white">Loading...</div>

        </div>

        <div class="col-span-1 rounded-lg shadow-md overflow-hidden">
            <div class="bg-red-500 text-white p-3 ">
                <h1>Bookmark</h1>
                <p id="bookmarkcount">0</p>
            </div>

            <div id="bookmarkcontainer">

            </div>

        </div>

    </main>

    <!-- Open the modal using ID.showModal() method -->
   
    <dialog id="news_details_modal" class="modal">
        <div class="modal-box">
            <div id="modal_Container">

            </div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>


    <script src="script.js"></script>
